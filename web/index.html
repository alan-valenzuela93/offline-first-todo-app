<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="todo_app_web">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>todo_app_web</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #eaf3f1;
    }

    .app-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: #eaf3f1;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    flt-glass-pane,
    flutter-view {
      background: transparent !important;
    }

    .app-loader--hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .app-loader__content {
      display: grid;
      gap: 16px;
      justify-items: center;
      color: #287c72;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      font-weight: 800;
    }

    .app-loader__spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #cfe2dd;
      border-top-color: #287c72;
      border-radius: 50%;
      animation: app-loader-spin 780ms linear infinite;
    }

    @keyframes app-loader-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="app-loader" class="app-loader" role="status" aria-live="polite">
    <div class="app-loader__content">
      <div class="app-loader__spinner" aria-hidden="true"></div>
      <div>Cargando...</div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('app-loader');
      if (!loader) return;
      loader.classList.add('app-loader--hidden');
      window.setTimeout(function () {
        loader.remove();
      }, 220);
    });
  </script>
  <script src="flutter_bootstrap.js?v=app-loader-1" async></script>
</body>
</html>
