<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="todo_app_web">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>todo_app_web</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #F8FAFC;
    }

    .app-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F8FAFC;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    flt-glass-pane,
    flutter-view {
      background: transparent !important;
    }

    .app-loader--hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .app-loader__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      user-select: none;
    }

    .app-loader__brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-loader__icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #4F46E5, #6366F1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.28);
    }

    .app-loader__icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: #ffffff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .app-loader__title {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: #1E1B4B;
      letter-spacing: -0.3px;
    }

    .app-loader__dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .app-loader__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6366F1;
      animation: dot-pulse 1.2s ease-in-out infinite;
    }

    .app-loader__dot:nth-child(1) { animation-delay: 0ms; }
    .app-loader__dot:nth-child(2) { animation-delay: 180ms; background: #818CF8; }
    .app-loader__dot:nth-child(3) { animation-delay: 360ms; background: #A5B4FC; }

    @keyframes dot-pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50%       { transform: scale(1.5); opacity: 1; }
    }
  </style>
</head>

<body>
  <div id="app-loader" class="app-loader" role="status" aria-live="polite">
    <div class="app-loader__content">
      <div class="app-loader__brand" aria-hidden="true">
        <div class="app-loader__icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <span class="app-loader__title">Offline Tasks</span>
      </div>
      <div class="app-loader__dots" aria-label="Cargando">
        <div class="app-loader__dot"></div>
        <div class="app-loader__dot"></div>
        <div class="app-loader__dot"></div>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('app-loader');
      if (!loader) return;
      loader.classList.add('app-loader--hidden');
      window.setTimeout(function () {
        loader.remove();
      }, 220);
    });
  </script>
  <script src="flutter_bootstrap.js?v=app-loader-1" async></script>
</body>

</html>
